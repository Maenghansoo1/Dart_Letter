name: dartletter
description: "다트레터 - DART 공시 AI 분석 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - .env

  # Pretendard 폰트: assets/fonts/ 에 TTF 파일 추가 후 아래 주석 해제
  # https://github.com/orioncactus/pretendard/releases
