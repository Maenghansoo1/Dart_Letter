<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다트레터 — 프로젝트 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#534AB7;--p2:#7B74D4;--p3:#EEEDFE;
  --bg:#0A0A0F;--bg2:#12121A;--bg3:#1A1A26;
  --t:#FFFFFF;--t2:#A0A0B8;--t3:#5A5A7A;
  --up:#E24B4A;--dn:#378ADD;
}
body{background:var(--bg);color:var(--t);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
.hero{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:40px 20px;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(83,74,183,0.3) 0%, transparent 70%);
  pointer-events:none;
}
.grid-bg{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(83,74,183,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(83,74,183,0.06) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(83,74,183,0.15);border:1px solid rgba(83,74,183,0.4);
  padding:6px 16px;border-radius:100px;
  font-family:'Space Mono',monospace;font-size:12px;color:var(--p2);
  margin-bottom:32px;animation:fadeUp 0.6s ease both;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--p2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
h1{
  font-size:clamp(48px,8vw,96px);font-weight:900;line-height:1;
  text-align:center;margin-bottom:16px;
  animation:fadeUp 0.6s 0.1s ease both;
}
h1 span{color:var(--p2)}
.sub{
  font-size:clamp(14px,2vw,18px);color:var(--t2);text-align:center;
  max-width:500px;line-height:1.7;margin-bottom:64px;
  animation:fadeUp 0.6s 0.2s ease both;
}
.cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;width:100%;max-width:960px;
  animation:fadeUp 0.6s 0.3s ease both;
}
.card{
  background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;
  padding:32px;cursor:pointer;text-decoration:none;color:var(--t);
  transition:all 0.3s;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(83,74,183,0.1),transparent);
  opacity:0;transition:opacity 0.3s;
}
.card:hover{border-color:var(--p);transform:translateY(-4px);box-shadow:0 20px 60px rgba(83,74,183,0.2)}
.card:hover::before{opacity:1}
.card-num{
  font-family:'Space Mono',monospace;font-size:11px;color:var(--t3);
  margin-bottom:16px;letter-spacing:2px;
}
.card-icon{font-size:36px;margin-bottom:16px}
.card-title{font-size:22px;font-weight:700;margin-bottom:8px}
.card-desc{font-size:14px;color:var(--t2);line-height:1.6}
.card-arrow{
  position:absolute;bottom:24px;right:24px;
  width:36px;height:36px;border-radius:50%;
  background:var(--p3);color:var(--p);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all 0.3s;
}
.card:hover .card-arrow{background:var(--p);color:white;transform:translate(2px,-2px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="hero">
  <div class="grid-bg"></div>
  <div class="badge"><div class="dot"></div>기말 프로젝트 — 2025</div>
  <h1>다트<span>레터</span></h1>
  <p class="sub">DART 공시를 AI가 쉽게 풀어주는 기업분석 앱 — 프로젝트 발표 자료</p>
  <div class="cards">
    <a href="vision.html" class="card">
      <div class="card-num">01 / VISION</div>
      <div class="card-icon">🎯</div>
      <div class="card-title">기획 & 비전</div>
      <div class="card-desc">문제 정의, 솔루션, 핵심 가치 — 왜 다트레터인가</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="architecture.html" class="card">
      <div class="card-num">02 / ARCHITECTURE</div>
      <div class="card-icon">🏗️</div>
      <div class="card-title">아키텍처 설계</div>
      <div class="card-desc">기술 스택, 시스템 구성, 데이터 흐름 다이어그램</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="presentation.html" class="card">
      <div class="card-num">04 / PRESENTATION</div>
      <div class="card-icon">🎤</div>
      <div class="card-title">중간 발표 슬라이드</div>
      <div class="card-desc">9장 슬라이드 웹 뷰어 + Marp .md 파일 다운로드</div>
      <div class="card-arrow">→</div>
    </a>
    <a href="wbs.html" class="card">
      <div class="card-num">03 / WBS</div>
      <div class="card-icon">📊</div>
      <div class="card-title">WBS 일정</div>
      <div class="card-desc">13단계 개발 일정 및 진행 현황 한눈에 보기</div>
      <div class="card-arrow">→</div>
    </a>
  </div>
</div>
</body>
</html>
